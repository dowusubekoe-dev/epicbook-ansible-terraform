trigger:
- main

pool:
  name: epicbook-deploy-agent

variables:
  TF_IN_AUTOMATION: true

stages:
- stage: Terraform_Infrastructure
  displayName: "Terraform Infra Deployment"
  jobs:
  - job: TerraformJob
    displayName: "Provision Azure Infrastructure"
    steps:

    # -----------------------------
    # 1. Terraform Install (assumes already installed on agent OR add installer task if needed)
    # -----------------------------
    - script: |
        echo "Checking Terraform version..."
        terraform version
      displayName: "Terraform Version Check"

    # -----------------------------
    # 2. Init Terraform Backend
    # -----------------------------
    - script: |
        echo "Initializing Terraform backend..."
        terraform init -reconfigure
      displayName: "Terraform Init"
      workingDirectory: $(System.DefaultWorkingDirectory)/infra-epicbook

    - script: |
        terraform init -reconfigure
      workingDirectory: $(System.DefaultWorkingDirectory)/infra-epicbook
      displayName: "Terraform Init"

    # -----------------------------
    # 3. Validate Terraform Code
    # -----------------------------
    - script: |
        echo "Validating Terraform configuration..."
        terraform validate
      displayName: "Terraform Validate"
      workingDirectory: $(System.DefaultWorkingDirectory)/infra-epicbook

    # -----------------------------
    # 4. Show tfvars (debug safety check)
    # -----------------------------
    - script: |
        echo "Checking tfvars file..."
        cat pipeline.tfvars || echo "pipeline.tfvars NOT FOUND"
      displayName: "Verify tfvars File"
      workingDirectory: $(System.DefaultWorkingDirectory)/infra-epicbook

    # -----------------------------
    # 5. Terraform Plan
    # -----------------------------
    - script: |
        echo "Running Terraform Plan..."

        terraform plan \
          -var-file=pipeline.tfvars \
          -detailed-exitcode

      displayName: "Terraform Plan"
      workingDirectory: $(System.DefaultWorkingDirectory)/infra-epicbook
      continueOnError: false

    # -----------------------------
    # 6. Terraform Apply (only if approved or CI policy allows)
    # -----------------------------
    - script: |
        echo "Applying Terraform changes..."
        terraform apply -auto-approve \
          -var-file=pipeline.tfvars

      displayName: "Terraform Apply"
      workingDirectory: $(System.DefaultWorkingDirectory)/infra-epicbook