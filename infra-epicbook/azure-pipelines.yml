trigger:
- main

pool:
  name: epicbook-deploy-agent

# -----------------------------
# VARIABLES (CORRECT FORMAT)
# -----------------------------
variables:
- group: epicbook-secrets
- name: TF_IN_AUTOMATION
  value: true

stages:

# -----------------------------
# STAGE 1: TERRAFORM DEPLOY
# -----------------------------
- stage: TerraformDeploy
  displayName: "Terraform Deploy"

  jobs:
  - job: terraform
    displayName: "Terraform Job"

    steps:

    # -----------------------------
    # VERIFY TERRAFORM INSTALLATION
    # -----------------------------
    - script: |
        terraform -v
      displayName: "Check Terraform Version"

    # -----------------------------
    # INIT
    # -----------------------------
    - script: |
        terraform init -reconfigure \
        -backend-config=storage_account_name=tfstatedobepicbook \
        -backend-config=container_name=tfstate \
        -backend-config=key=epicbook.tfstate \
        -backend-config=resource_group_name=tfstate-rg \
      workingDirectory: infra-epicbook
      displayName: "Terraform Init (Reconfigure Backend)"

    - script: |
        echo "Logging into Azure..."

        az login --service-principal \
          -u $ARM_CLIENT_ID \
          -p $ARM_CLIENT_SECRET \
          --tenant $ARM_TENANT_ID

        az account set --subscription $ARM_SUBSCRIPTION_ID

        echo "Login successful"
      env:
        ARM_CLIENT_ID: $(client_id)
        ARM_CLIENT_SECRET: $(client_secret)
        ARM_TENANT_ID: $(tenant_id)
        ARM_SUBSCRIPTION_ID: $(subscription_id)
      displayName: "Azure Login"

    - script: |
        rm -rf .terraform
        rm -rf terraform.tfstate*
      displayName: "Clean Terraform Cache"

    # -----------------------------
    # INIT
    # -----------------------------
    - task: TerraformTaskV4@4
      displayName: "Terraform Init"
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: 'infra-epicbook'
        backendServiceArm: 'epicbook-devops-sb'
        backendAzureRmResourceGroupName: 'tfstate-rg'
        backendAzureRmStorageAccountName: 'tfstateepicbook1234'
        backendAzureRmContainerName: 'tfstate'
        backendAzureRmKey: 'epicbook.tfstate'

    - script: |
        az login --service-principal \
        -u $(client_id) \
        -p $(client_secret) \
        --tenant $(tenant_id)

        az account set --subscription $(subscription_id)
      displayName: "Azure CLI Login"

    # -----------------------------
    # VALIDATE
    # -----------------------------
    - task: TerraformTaskV4@4
      displayName: "Terraform Validate"
      inputs:
        provider: 'azurerm'
        command: 'validate'
        workingDirectory: 'infra-epicbook'

    # -----------------------------
    # PLAN
    # -----------------------------
    - task: TerraformTaskV4@4
      displayName: "Terraform Plan"
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: 'infra-epicbook'
        environmentServiceNameAzureRM: 'epicbook-devops-sb'

    # -----------------------------
    # APPLY
    # -----------------------------
    - task: TerraformTaskV4@4
      displayName: "Terraform Apply"
      inputs:
        provider: 'azurerm'
        command: 'apply'
        workingDirectory: 'infra-epicbook'
        environmentServiceNameAzureRM: 'epicbook-devops-sb'
        commandOptions: '-auto-approve'

    # -----------------------------
    # EXPORT OUTPUTS
    # -----------------------------
    - script: |
        terraform output -json > tfoutputs.json
      displayName: "Export Terraform Outputs"
      workingDirectory: infra-epicbook

    # -----------------------------
    # PUBLISH OUTPUTS ARTIFACT
    # -----------------------------
    - publish: infra/tfoutputs.json
      artifact: tfoutputs
      displayName: "Publish Terraform Outputs"