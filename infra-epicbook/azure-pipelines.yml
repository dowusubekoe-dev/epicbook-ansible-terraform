trigger:
- main

pool:
  name: epicbook-deploy-agent

variables:
  TF_IN_AUTOMATION: true


stages:
- stage: Infra
  displayName: "Terraform Infrastructure"
  jobs:
  - job: TerraformJob
    displayName: "Provision Azure Resources"
    steps:

    # ----------------------------
    # SET WORKING DIRECTORY ONCE
    # ----------------------------
    - script: |
        echo "Terraform directory:"
        ls -la
      workingDirectory: $(System.DefaultWorkingDirectory)/infra-epicbook
      displayName: "Debug Directory"

    # ----------------------------
    # 1. GENERATE TFVARS
    # ----------------------------
    - script: |
        echo "Secure file path: $(sshkey.secureFilePath)"
        SSH_KEY=$(cat "$(sshkey.secureFilePath)")
        printf 'ssh_public_key="%s"\n' "$SSH_KEY" > pipeline.tfvars
        cat pipeline.tfvars
      workingDirectory: $(System.DefaultWorkingDirectory)/infra-epicbook
      displayName: "Generate tfvars"

    # ----------------------------
    # 2. TERRAFORM INIT
    # ----------------------------
    - script: |
        terraform init -reconfigure

      workingDirectory: $(System.DefaultWorkingDirectory)/infra-epicbook
      displayName: "Terraform Init"

    # ----------------------------
    # 3. TERRAFORM PLAN
    # ----------------------------
    - script: |
        terraform plan -var-file=pipeline.tfvars -detailed-exitcode

      workingDirectory: $(System.DefaultWorkingDirectory)/infra-epicbook
      displayName: "Terraform Plan"

    # ----------------------------
    # 4. TERRAFORM APPLY (optional stage gating recommended)
    # ----------------------------
    - script: |
        terraform apply -auto-approve -var-file=pipeline.tfvars

      workingDirectory: $(System.DefaultWorkingDirectory)/infra-epicbook
      displayName: "Terraform Apply"