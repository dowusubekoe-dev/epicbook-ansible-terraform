trigger:
- main

pool:
  name: epicbook-deploy-agent

variables:
- group: epicbook-secrets
- name: TF_IN_AUTOMATION
  value: true

stages:

- stage: TerraformDeploy
  displayName: "Terraform Deploy"

  jobs:
  - job: terraform
    displayName: "Terraform Job"

    steps:

    - task: TerraformTaskV4@4
      displayName: "Terraform Init"
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: 'infra-epicbook'
        backendServiceArm: 'epicbook-devops-sb'
        backendAzureRmResourceGroupName: 'tfstate-rg'
        backendAzureRmStorageAccountName: 'tfstatedobepicbook'
        backendAzureRmContainerName: 'tfstate'
        backendAzureRmKey: 'epicbook.tfstate'

    - task: TerraformTaskV4@4
      displayName: "Terraform Validate"
      inputs:
        provider: 'azurerm'
        command: 'validate'
        workingDirectory: 'infra-epicbook'

    # DEBUG (REMOVE LATER)
    - script: |
        echo "SSH KEY LENGTH:"
        echo "$(ssh_public_key)" | wc -c
        echo "FIRST 30 CHARS:"
        echo "$(ssh_public_key)" | cut -c1-30
      displayName: "Debug SSH Key"

    - task: TerraformTaskV4@4
      displayName: "Terraform Plan"
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: 'infra-epicbook'
        environmentServiceNameAzureRM: 'epicbook-devops-sb'
        commandOptions: >
          -var="ssh_public_key=$(ssh_public_key)"

    - task: TerraformTaskV4@4
      displayName: "Terraform Apply"
      inputs:
        provider: 'azurerm'
        command: 'apply'
        workingDirectory: 'infra-epicbook'
        environmentServiceNameAzureRM: 'epicbook-devops-sb'
        commandOptions: >
          -auto-approve
          -var="ssh_public_key=$(ssh_public_key)"

    - task: TerraformTaskV4@4
      displayName: "Terraform Output"
      inputs:
        provider: 'azurerm'
        command: 'output'
        workingDirectory: 'infra-epicbook'

    - script: |
        terraform output -json > tfoutputs.json
      workingDirectory: infra-epicbook
      displayName: "Export Terraform Outputs"

    - publish: infra-epicbook/tfoutputs.json
      artifact: tfoutputs
      displayName: "Publish Terraform Outputs"