trigger:
- main

pool:
  name: epicbook-deploy-agent

variables:
- group: epicbook-secrets
- name: TF_IN_AUTOMATION
  value: true

stages:

- stage: TerraformDeploy
  displayName: "Terraform Deploy"

  jobs:
  - job: terraform
    displayName: "Terraform Job"

    steps:

    # -----------------------------
    # DOWNLOAD SSH KEY
    # -----------------------------
    - task: DownloadSecureFile@1
      name: sshkey
      inputs:
        secureFile: 'azure_vm_key.pub'
      displayName: "Download SSH Public Key"

    # -----------------------------
    # NORMALIZE SSH KEY (IMPORTANT FIX)
    # -----------------------------
    - bash: |
        KEY=$(tr -d '\r' < "$(sshkey.secureFilePath)")
        echo "##vso[task.setvariable variable=TF_VAR_ssh_public_key]$KEY"
      displayName: "Load SSH Key Safely"

    # -----------------------------
    # INIT
    # -----------------------------
    - task: TerraformTaskV4@4
      displayName: "Terraform Init"
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: 'infra-epicbook'
        backendServiceArm: 'epicbook-devops-sb'
        backendAzureRmResourceGroupName: 'tfstate-rg'
        backendAzureRmStorageAccountName: 'tfstatedobepicbook'
        backendAzureRmContainerName: 'tfstate'
        backendAzureRmKey: 'epicbook.tfstate'

    # -----------------------------
    # VALIDATE
    # -----------------------------
    - task: TerraformTaskV4@4
      displayName: "Terraform Validate"
      inputs:
        provider: 'azurerm'
        command: 'validate'
        workingDirectory: 'infra-epicbook'

    # -----------------------------
    # PLAN (NOW PICKS UP TF_VAR AUTOMATICALLY)
    # -----------------------------
    - task: TerraformTaskV4@4
      displayName: "Terraform Plan"
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: 'infra-epicbook'
        environmentServiceNameAzureRM: 'epicbook-devops-sb'

    # -----------------------------
    # APPLY
    # -----------------------------
    - task: TerraformTaskV4@4
      displayName: "Terraform Apply"
      inputs:
        provider: 'azurerm'
        command: 'apply'
        workingDirectory: 'infra-epicbook'
        environmentServiceNameAzureRM: 'epicbook-devops-sb'
        commandOptions: '-auto-approve'

    # -----------------------------
    # OUTPUTS
    # -----------------------------
    - task: TerraformTaskV4@4
      displayName: "Terraform Output"
      inputs:
        provider: 'azurerm'
        command: 'output'
        workingDirectory: 'infra-epicbook'